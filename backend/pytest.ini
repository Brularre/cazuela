[pytest]
testpaths = tests
pythonpath = .
filterwarnings =
    # Starlette cookie API changed in newer versions — third-party, not ours
    ignore::DeprecationWarning:starlette
    # Expected in test env — TWILIO_SKIP_VALIDATION=true is set in conftest.py
    ignore:TWILIO_SKIP_VALIDATION is true:UserWarning
    # Intentional — tests that verify AI fallback behavior trigger these warnings
    ignore:AI agent failed:UserWarning
    ignore:AI router failed:UserWarning
    # Auth tests mock a short SESSION_SECRET for simplicity — not a prod concern
    ignore::jwt.warnings.InsecureKeyLengthWarning
